spring.application.name=demo1
server.port=8080

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

ai.base-url=${AI_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:mimo-v2.5}
ai.temperature=${AI_TEMPERATURE:0.0}
ai.timeout-seconds=${AI_TIMEOUT_SECONDS:180}
ai.max-retries=${AI_MAX_RETRIES:1}
ai.max-image-size-mb=${AI_MAX_IMAGE_SIZE_MB:5}
