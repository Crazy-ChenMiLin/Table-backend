spring.application.name=demo1
server.port=8080

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

mimo.base-url=${MIMO_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
mimo.api-key=${MIMO_API_KEY:}
mimo.model=mimo-v2.5
mimo.temperature=${MIMO_TEMPERATURE:0.0}
mimo.timeout-seconds=${MIMO_TIMEOUT_SECONDS:180}
mimo.max-retries=${MIMO_MAX_RETRIES:1}
mimo.max-image-size-mb=${MIMO_MAX_IMAGE_SIZE_MB:5}
